# Oracle AI Database 26ai Free for the validator.
# Pinned by tag (update digest after validating behavior on each quarterly RU).
services:
  oracle:
    image: container-registry.oracle.com/database/free:26ai
    container_name: json-sql-guide-oracle
    shm_size: 1g
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: validator
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./fixture/init:/opt/oracle/scripts/startup:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo exit | sqlplus -L validator/validator@//localhost:1521/FREEPDB1 | grep -q 'Connected'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  oracle-data:
