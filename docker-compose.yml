# Oracle AI Database 26ai Free for the validator.
#
# Uses gvenzl's full faststart 23.26 image — boots in ~30s vs 3+ min
# for the official ``container-registry.oracle.com/database/free``
# image and ships every optional component the guide exercises,
# including Oracle Text (needed for the §11 ``CREATE SEARCH INDEX``
# examples). Switch to ``-slim-faststart`` if image size matters more
# than full feature coverage; that variant strips Oracle Text and the
# search-index snippets will fail with ORA-29833.
services:
  oracle:
    image: gvenzl/oracle-free:23.26.0-faststart
    container_name: json-sql-guide-oracle
    shm_size: 1g
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oraclepw
      APP_USER: validator
      APP_USER_PASSWORD: validator
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "bash", "-c", "echo exit | sqlplus -L system/oraclepw@//localhost:1521/FREEPDB1 | grep -q 'Connected'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  oracle-data:
